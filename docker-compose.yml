version: "3.9"

services:
  db:
    image: postgres:16
    container_name: bot_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: always

  app:
    build: .
    container_name: bot_app
    env_file: .env
    depends_on:
      - db
    expose:
      - "3000"
    volumes:
      - .:/app
    networks:
      - backend
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./cpp/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - backend
    depends_on:
      - app
    restart: always

volumes:
  pgdata:

networks:
  backend:
