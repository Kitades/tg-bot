services:
  db:
    image: postgres:16
    container_name: bot
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: always

  app:
    build: .
    container_name: bot_app
    env_file: .env
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - backend
    restart: always

  nginx:
    image: nginx:1.24
    container_name: nginx
    depends_on:
      - app
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/site.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /dev/null:/etc/nginx/conf.d/default.conf   # <-- фикс конфликтов
    ports:
      - "80:80"
      - "443:443"
    networks:
      - backend
    restart: always

volumes:
  pgdata:

networks:
  backend: