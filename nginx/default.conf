# -----------------------
# HTTP → HTTPS redirect
# -----------------------
server {
    listen 80;
    server_name potyaevprobot.ru www.potyaevprobot.ru;

    return 301 https://$host$request_uri;
}

# -----------------------
# HTTPS server
# -----------------------
server {
    listen 443 ssl;
    server_name potyaevprobot.ru www.potyaevprobot.ru;

    # SSL
    ssl_certificate     /etc/letsencrypt/live/potyaevprobot.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/potyaevprobot.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ЮKassa webhook
    location /yookassa_webhook {
        proxy_pass http://app:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Основной путь → бот
    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        client_max_body_size 10M;
        proxy_read_timeout    60s;
    }
}
